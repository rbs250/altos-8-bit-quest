<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Altos 8-Bit Quest</title>
  <meta name="description" content="A retro HD pixel-art dragon platformer: hatch Altos, fly, breathe fire, collect gems, and evolve.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Altos 8-Bit Quest">
  <meta property="og:description" content="Hatch Altos, fly, breathe fire, collect gems, and evolve in a retro HD dragon platformer.">
  <meta property="og:image" content="./assets/cover-social.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Altos 8-Bit Quest">
  <meta name="twitter:description" content="A retro HD dragon platformer for the browser.">
  <meta name="twitter:image" content="./assets/cover-social.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="cabinet">
    <div class="screen">
      <canvas id="game" width="640" height="360" tabindex="0" aria-label="Altos 8-Bit Quest game"></canvas>
      <div class="scanlines"></div>
    </div>
    <div class="marquee">
      <span>ALTOS 8-BIT QUEST</span>
      <button id="restart" type="button">RESET</button>
    </div>
    <div class="touch-controls" aria-label="Touch controls">
      <div class="touch-pad" aria-label="Movement">
        <button class="touch-btn touch-dir" type="button" data-control="left" aria-label="Move left">◀</button>
        <button class="touch-btn touch-dir" type="button" data-control="down" aria-label="Drop down">▼</button>
        <button class="touch-btn touch-dir" type="button" data-control="right" aria-label="Move right">▶</button>
      </div>
      <div class="touch-actions" aria-label="Actions">
        <button class="touch-btn touch-start" type="button" data-control="start" aria-label="Start or select">START</button>
        <button class="touch-btn touch-action" type="button" data-control="flap" aria-label="Flap upward">▲</button>
        <button class="touch-btn touch-action" type="button" data-control="fire" aria-label="Fire">FIRE</button>
      </div>
    </div>
  </main>
  <script src="./characters.js"></script>
  <script src="./game.js"></script>
</body>
</html>
